<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .navbar {
            position: sticky;
            top: 0;
            background-color: #0d47a1;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .hero {
            height: 100vh;
            background: linear-gradient(45deg, #00bcd4, #2196f3);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .feature-cards {
            display: flex;
            justify-content: space-around;
            margin: 20px;
        }
        .card {
            background: white;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px;
            width: 30%;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .about {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
        }
        .badge {
            background-color: #2196f3;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            margin: 5px;
        }
        @media (max-width: 768px) {
            .feature-cards {
                flex-direction: column;
                align-items: center;
            }
            .card {
                width: 80%;
            }
        }
    </style>
    <title>Pathology Software Download</title>
</head>
<body>
    <div class="navbar">
        <div>Logo</div>
        <div>Links</div>
    </div>
    <div class="hero">
        <h1 style="color: white;">Welcome to the Pathology Software</h1>
    </div>
    <div class="feature-cards">
        <div class="card">
            <h2>Feature 1</h2>
            <p>Description of feature 1.</p>
        </div>
        <div class="card">
            <h2>Feature 2</h2>
            <p>Description of feature 2.</p>
        </div>
        <div class="card">
            <h2>Feature 3</h2>
            <p>Description of feature 3.</p>
        </div>
    </div>
    <div class="about">
        <h2>About Us</h2>
        <p>We provide top-notch pathology software solutions.</p>
        <span class="badge">Award 1</span>
        <span class="badge">Award 2</span>
    </div>
</body>
</html>
